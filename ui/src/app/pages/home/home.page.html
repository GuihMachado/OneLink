<div class="bg-pink-300 w-full h-screen bg-linear-to-b from-pink-300 to-pink-500">
    <div class="pt-15">
        <img src="../../../assets/logo-renata.png" class="justify-self-center pt-10">
        <span class="font-calibri font-semibold text-3xl flex justify-center pt-5">Renata Martho</span>
        <span class="text-xs flex justify-center font-bold">Consultora Mary Kay</span>
    
        <div class="px-4 mt-20 space-y-4">
            <div hlmButtonGroup class="w-full h-15">
                <button hlmBtn mat-ripple class="w-7/8 flex justify-between h-full" (click)="redirectTo('instagram')">
                    <ng-icon hlm name="lucideInstagram" class="justify-start"/>
                    <span>Instagram</span>
                    <div>
    
                    </div>
                </button>
                <button hlmBtn class="w-1/8 h-full" [hlmDropdownMenuTrigger]="menu">
                    <ng-icon hlm name="lucideMoreVertical" class="justify-start"/>
                </button>
            </div>
    
            <div hlmButtonGroup class="w-full h-15">
                <button hlmBtn mat-ripple class="w-7/8 flex justify-between h-full" [cdkCopyToClipboard]="chavePix" (cdkCopyToClipboardCopied)="onCopySuccess()">
                    <ng-icon hlm name="lucideQrCode" class="justify-start"/>
                    <span>{{ copiado ? 'Chave Pix Copiada!' : 'Copiar Chave Pix' }}</span>
                    <div>
    
                    </div>
                </button>
                <button hlmBtn class="w-1/8 h-full" [hlmDropdownMenuTrigger]="menu">
                    @if (copiado) {
                        <ng-icon hlm name="lucideCheck" class="justify-start"/>
                    }@else {
                        <ng-icon hlm name="lucideMoreVertical" class="justify-start"/>
                    }
                </button>
            </div>
    
            <div hlmButtonGroup class="w-full h-15">
                <button hlmBtn mat-ripple class="w-7/8 flex justify-between h-full" (click)="redirectTo('catalog')">
                    <ng-icon hlm name="lucideAlbum" class="justify-start"/>
                    <span>Catálogo</span>
                    <div>
    
                    </div>
                </button>
                <button hlmBtn class="w-1/8 h-full" [hlmDropdownMenuTrigger]="menu">
                    <ng-icon hlm name="lucideMoreVertical" class="justify-start"/>
                </button>
            </div>
        </div>
        <img src="../../../assets/mary-kay.png" class="justify-self-center pt-30 w-40">
    </div>
</div>

<ng-template #menu>
  <hlm-dropdown-menu class="mr-4" class="bg-primary text-white">
    <hlm-dropdown-menu-group>
      <button hlmDropdownMenuItem class="flex justify-between">
        Copiar
        <ng-icon hlm name="lucideCopy" class="justify-start"/>
      </button>
      <hlm-dropdown-menu-separator />
      <button hlmDropdownMenuItem class="flex justify-between">
        Compartilhar
        <ng-icon hlm name="lucideShare2" class="justify-start"/>
      </button>
    </hlm-dropdown-menu-group>
  </hlm-dropdown-menu>
</ng-template>
